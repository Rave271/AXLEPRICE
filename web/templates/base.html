<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="AxlePrice — UK used car valuation demo" />
    <title>{{ title or "AxlePrice" }}</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="/" aria-label="Home">
          <span class="brand-text">AxlePrice</span>
        </a>

        <nav class="nav" aria-label="Primary">
          <a class="nav-link {{ 'active' if active_page == 'home' else '' }}" href="/">Home</a>
          <a class="nav-link {{ 'active' if active_page == 'valuation' else '' }}" href="/valuation">Valuation</a>
          <a class="nav-link {{ 'active' if active_page == 'about' else '' }}" href="/about">About</a>
          {% if is_logged_in %}
          <a class="nav-link" href="/logout">Logout</a>
          {% else %}
          <a class="nav-link {{ 'active' if active_page == 'login' else '' }}" href="/login">Login</a>
          {% endif %}
        </nav>
      </div>
    </header>

    <main class="container">
      {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <span>Local demo • Predictions are estimates</span>
        <span class="sep" aria-hidden="true">·</span>
        <a class="footer-link" href="/about">How it works</a>
      </div>
    </footer>

    {% block scripts %}{% endblock %}
  </body>
</html>
